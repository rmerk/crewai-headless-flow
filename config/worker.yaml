# =============================================================================
# worker.yaml — Per-stage control of the headless coding worker
# =============================================================================
# This is the PRIMARY reusability lever.
#
# You can switch any stage between "codex", "grok", "claude", "gemini", and "cursor" by editing only
# this file. No Python code changes required.
#
# Supported workers: "codex" | "grok" | "claude" | "gemini" | "cursor"

defaults:
  worker: "claude"
  model: "claude-opus-4.8"
  timeout: 300

stages:
  plan:
    # Planning is read-only and now goes through the configured worker by default
    worker: "claude"
    model: null
    crew:
      # Optional richer multi-agent planning. Disabled by default to preserve the
      # direct worker-backed plan path. process="sequential" (default) or
      # "hierarchical" are supported; other values fail config validation.
      enabled: false
      process: "sequential"
      # Sequential-only: when enabled, the Planning Coordinator agent gets
      # allow_delegation=True (DelegateWorkTool / AskQuestionTool) so it can
      # pull in another crew agent mid-task instead of only reading the
      # frozen research/draft/validation task context.
      delegation:
        enabled: false
      # Hierarchical-only: LLM for the auto-created manager agent, used only
      # when process="hierarchical". Falls back to the crew `llm` below if
      # left unset. Use a strong tool-calling model (e.g. gpt-4o class) here
      # -- small/local models are known to mis-format delegation tool calls
      # or have the manager skip delegation and do the work itself.
      manager:
        llm:
          model: null
          base_url: "http://localhost:11434"
          temperature: 0.2
      llm:
        model: "ollama/llama3.2"
        base_url: "http://localhost:11434"
        temperature: 0.2

  do_work:
    # The heavy lifting stage — choose your preferred coding agent
    worker: "claude"
    model: "sonnet"
    # Fixed safety declaration for Grok edit mode. The adapter already runs
    # edit mode non-interactively; unsupported values fail config validation.
    always_approve: true
    # Optional `isolation` knob: where serial (single-task and direct) edits
    # run. "in_place" (default when omitted) edits the target repo directly;
    # "copy" runs each edit in a disposable workspace copy and merges only
    # clean results back — a failed or deny-blocked edit leaves the target
    # repo pristine. Parallel batches always use copies.
    # Override: --override-stage-extra do_work.isolation=copy
    crew:
      # Optional richer multi-agent implementation. Disabled by default; when
      # combined with do_work.parallel.enabled, crew-backed tasks can still use
      # isolated per-task workspaces and conflict-safe mergeback. max_rounds
      # bounds self-correction before the Flow marks the task failed.
      # decomposition can optionally split one planned task into a few smaller
      # ordered execution slices before edit-mode work begins.
      # process="sequential" (default) or "hierarchical" are supported; other
      # values fail config validation.
      enabled: false
      process: "sequential"
      # Sequential-only: when enabled, the Implementation Coordinator agent
      # gets allow_delegation=True so it can pull in the evidence/verifier
      # agent mid-task instead of only reading the frozen task context.
      delegation:
        enabled: false
      # Hierarchical-only: LLM for the auto-created manager agent, used only
      # when process="hierarchical". Falls back to the crew `llm` below if
      # left unset. Use a strong tool-calling model here -- small/local
      # models are known to mis-format delegation tool calls or have the
      # manager skip delegation and do the work itself.
      manager:
        llm:
          model: null
          base_url: "http://localhost:11434"
          temperature: 0.2
      max_rounds: 2
      decomposition:
        enabled: false
        max_subtasks: 4
      llm:
        model: "ollama/llama3.2"
        base_url: "http://localhost:11434"
        temperature: 0.2
    parallel:
      enabled: false
      max_workers: 2
      planner:
        # Optional inspect-mode next-batch planner. When static file hints would
        # only allow a one-task batch, this planner can pick a larger ready
        # batch and add missing file hints before execution. Actual overlap
        # detection during mergeback still remains final safety gate.
        enabled: false
    replan:
      # Optional inspect-mode revision replanner. After review returns `revise`,
      # it can replace the full structured task graph before next do_work round.
      # Unchanged completed tasks are preserved conservatively when possible.
      enabled: false
      # Optional execution-time replanner. When a task fails inside do_work, it
      # can replace remaining task graph and continue same do_work round.
      on_execution_failure: false
      # Optional success-time replanner. When a task succeeds but changes files
      # assigned to other remaining tasks, it can replace the remaining graph
      # inside same do_work round.
      on_cross_task_change: false
      # Optional ambiguous-success replanner. When a task exits successfully
      # but produces weak evidence (for example no changed files or no overlap
      # with planned task files), it can replace the remaining graph inside the
      # same do_work round.
      on_ambiguous_success: false
      max_execution_replans: 1

  review:
    # Reviews should be read-only / inspect mode
    worker: "claude"
    # Fixed safety declaration for inspect/review mode. The adapter enforces
    # read-only behavior; unsupported values fail config validation.
    sandbox: "read-only"
    crew:
      # Optional richer multi-agent review. Disabled by default to preserve v0.1 behavior.
      # process="sequential" (default) or "hierarchical" are supported; other
      # values fail config validation.
      enabled: false
      process: "sequential"
      # Sequential-only: when enabled, the Review Coordinator agent gets
      # allow_delegation=True so it can ask a specialist reviewer (evidence,
      # correctness, test, or scope) mid-task instead of only reading the
      # frozen review task context.
      delegation:
        enabled: false
      # Hierarchical-only: LLM for the auto-created manager agent, used only
      # when process="hierarchical". Falls back to the crew `llm` below if
      # left unset. Use a strong tool-calling model here -- small/local
      # models are known to mis-format delegation tool calls or have the
      # manager skip delegation and do the work itself.
      manager:
        llm:
          model: null
          base_url: "http://localhost:11434"
          temperature: 0.2
      llm:
        model: "ollama/llama3.2"
        base_url: "http://localhost:11434"
        temperature: 0.2

  finalize:
    worker: "claude"
    model: null

# =============================================================================
# Human-in-the-Loop (HITL) configuration (Milestone 6)
# =============================================================================
human_feedback:
  enabled: false          # Master switch
  before_plan: false      # Optional pause before read-only planning
  before_do_work: true    # Pause before expensive edit stage
  before_review: false    # Optional pause before read-only review
  after_review: false     # Optional pause after automated review decision, with actual findings in hand
  before_finalize: true   # Pause before writing final docs/ADR
  capture_instructions: false  # After approval, optionally capture one-line operator guidance for gated stage prompt
  advanced_actions: false  # Optional stage shortcuts: do_work->review/replan/target-tasks, review->replan/rerun/force revise/pass/target-tasks, finalize->skip/rerun/reopen/target-tasks
  action_allowlist: {}     # Optional stage- or gate-scoped subset of advanced actions, e.g. {before_do_work: [target-tasks]}
  # Any of these can be overridden per run via --override-human-feedback KEY=VALUE
  # (dotted paths work for nested trees, e.g. escalation.channel=file)

  # How a fired gate reaches a human. "stdin" blocks on the terminal (the
  # default, pre-Phase-1 behavior). "file" writes pending_approval.json into
  # the run directory (--runs-dir) and parks the run resumably; answer by
  # adding an "answer" field and re-running with --resume-state-file.
  # "command" runs your hook with the request JSON on stdin and reads the
  # answer from its stdout — the plug point for Slack/email/webhook
  # notification.
  escalation:
    channel: stdin        # stdin | file | command
    command: null         # argv list, required when channel: command
    timeout_seconds: 300  # command channel: how long to wait for an answer
    on_timeout: abort     # abort | proceed

# =============================================================================
# Git delivery (autonomy Gap 2 — commit, then push/PR behind the verify gate)
# =============================================================================
# When enabled, a completed run commits the flow's own changed files onto a
# fresh {branch_prefix}{run_id} branch instead of leaving a dirty tree.
# Guardrails: never commits on the branch you were on, never `git add -A`
# (pre-existing dirt stays out of the flow's commit), never force-pushes.
# push ships the branch to `remote`; pr opens a PR via the `gh` CLI after a
# successful push (pr requires push, push requires commit). Whenever
# verify.commands is configured, push/pr require the latest verification
# round to have passed — otherwise they report blocked_unverified. A push/PR
# failure never demotes a successful local commit.
# Override per run via --override-deliver KEY=VALUE (e.g. enabled=true).
deliver:
  enabled: false
  branch_prefix: "flow/"
  commit: true
  push: false
  pr: false
  remote: origin
  protected_branches: [main, master]

# =============================================================================
# Objective verification gate (autonomy Phase 2)
# =============================================================================
# Commands the Flow runs in the target repo at the top of every review round
# (e.g. ["uv run pytest -q", "uv run ruff check ."]). They run as argv with no
# shell — wrap pipes/&& in a script. mode: gate means a failure skips the LLM
# review entirely and feeds the command output into the revise loop as issues;
# mode: advisory appends the results to the review prompt as evidence instead.
# Either way, deliver.push/pr require the latest verification to have passed
# whenever commands are configured. timeout is per command, in seconds.
# Override per run via --override-verify KEY=VALUE
# (e.g. --override-verify 'commands=["uv run pytest -q"]').
verify:
  commands: []
  mode: gate
  timeout: 600

# =============================================================================
# Deny paths (autonomy Phase 2 — Flow-owned write constraints)
# =============================================================================
# Relative globs matched against every changed file at the boundaries the
# Flow owns: parallel/isolated mergeback (denied files never leave the
# workspace copy; the task fails closed) and post-hoc snapshot diff for
# in-place edits (denied files are restored: tracked -> git checkout --,
# run-created -> deleted; pre-existing untracked files cannot be restored —
# use do_work.isolation: copy for full containment). fnmatch semantics with
# `*` crossing `/` — "*.env" also denies "sub/dir/x.env" (broad by design).
# Deliberately file-only: no CLI override can weaken this list.
# Example: deny: ["*.env", ".github/workflows/*", "secrets/*"]
paths:
  deny: []

# =============================================================================
# Per-worker settings (autonomy Phase 2 — WorkerSpec consolidation)
# =============================================================================
# Point a worker at a specific executable instead of relying on PATH lookup
# of its default name. Doctor probes the configured binary too.
# Override per run via --override-worker-binary WORKER=PATH.
# Example:
#   workers:
#     codex: {binary: "/opt/bin/codex"}
workers:
  claude:
    effort: "high"

# Stage extras like `plan.crew.*`, `do_work.crew.*`, `do_work.parallel.*`, or
# `review.crew.*` can be overridden per run via
# --override-stage-extra STAGE.PATH=VALUE
