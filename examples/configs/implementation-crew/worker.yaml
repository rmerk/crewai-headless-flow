defaults:
  worker: "codex"
  model: null
  timeout: 300

stages:
  plan:
    worker: "codex"
    model: null

  do_work:
    worker: "grok"
    model: "grok-3-latest"
    always_approve: true
    crew:
      enabled: true
      process: "sequential"
      max_rounds: 2
      decomposition:
        enabled: true
        max_subtasks: 3
      llm:
        model: "ollama/llama3.2"
        base_url: "http://localhost:11434"
        temperature: 0.2

  review:
    worker: "codex"
    sandbox: "read-only"

  finalize:
    worker: "codex"
    model: null

human_feedback:
  enabled: false
